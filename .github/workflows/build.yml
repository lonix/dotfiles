name: "YADM bootstrap"

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bootstrap:
    name: Bootstrap (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    env:
      CI: true
    steps:
      - name: Install YADM
        run: |
          mkdir -p ~/.bin
          curl -fLo ~/.bin/yadm https://github.com/TheLocehiliosan/yadm/raw/master/yadm
          chmod a+x ~/.bin/yadm
          echo "$HOME/.bin" >> "$GITHUB_PATH"
          ~/.bin/yadm version

      - name: Clone dotfiles
        run: yadm clone --no-bootstrap https://github.com/lonix/dotfiles.git

      - name: Apply alt files
        run: yadm alt

      - name: Run bootstrap
        run: yadm bootstrap

  bootstrap-almalinux:
    name: Bootstrap (AlmaLinux 9)
    runs-on: ubuntu-latest
    container: almalinux:9
    env:
      CI: true
    steps:
      - name: Install dependencies
        run: dnf install -y git

      - name: Install YADM
        run: |
          mkdir -p ~/.bin
          curl -fLo ~/.bin/yadm https://github.com/TheLocehiliosan/yadm/raw/master/yadm
          chmod a+x ~/.bin/yadm
          echo "$HOME/.bin" >> "$GITHUB_PATH"
          ~/.bin/yadm version

      - name: Clone dotfiles
        run: yadm clone --no-bootstrap https://github.com/lonix/dotfiles.git

      - name: Apply alt files
        run: yadm alt

      - name: Run bootstrap
        run: yadm bootstrap
